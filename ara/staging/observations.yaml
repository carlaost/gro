      than eliminating it. The deterministic tier is genuinely self-checking, but everything funders care
      about for IMPORTANCE (novelty, significance, validity) sits in the judged tier, whose trust rests on
      (a) human calibration corpora that don't exist yet and (b) LLM judge ensembles whose independence the
      spec itself concedes is ASSERTED, not measured — real decorrelation is earned at exactly one non-LLM
      checkpoint. Three concrete residuals: (1) the compiler-selection problem (what gets typed at all) is
      patched only by more LLM ensembles with the same shared-blind-spot risk — comfort, not closure; (2) the
      corpus-scale promise deflates to "deterministic integrity at 100k scale, judged importance only on a
      shortlist+audit-sample" — so it does NOT surface the un-shortlisted gem, which was the pitch; (3)
      adoption/incentive participation is assumed away in the spec's first sentence, which is exactly the
      incentive-design half of the program and the actual determinant of whether any of this matters. Net:
      credibility infrastructure is a trust-relocation + participation/incentive problem, not a representation
      problem; the format is necessary-not-sufficient in the same way its own independence checks are. This is
      the substrate critique made rigorous and is cleanly separable from the format-building.
