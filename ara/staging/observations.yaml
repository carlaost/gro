    provenance: ai-executed
    content: >
      Empirical finding (V2 run, N32): in the wave-1 AD-biomarker library, V1's grounding scores were
      largely unverifiable — 5/10 ARAs (cum26, jes26, kes25, pal25, tit26) ground every claim number to
