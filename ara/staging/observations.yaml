  - id: O22
    timestamp: "2026-07-05"
    provenance: ai-executed
    content: >
      Empirical result from V3 cycle-0 run at full n=12 [sem] coverage: adding the LLM-judge [sem] tier
      (evidence_relevance, falsifiability_quality, scope_calibration, novel_claim_count — scored
      deterministically from frozen per-claim judge findings) raised usable paper-rankers from 1/9 to
      4/9. Now usable (discriminating + validated): translation_trial_linkage, evidence_relevance,
      falsifiability_quality, scope_calibration. Headline finding: across the 12-ARA corpus,
      falsifiability criteria break down as 79 post_hoc_inversion / 16 real_precommitted / 5 trivial —
      i.e. ~79% are mechanical negations of the claim, QUANTITATIVELY confirming round-1's original charge
      that falsifiability_presence was a gamed proxy pinned at 1.0. scope_calibration caught 15 real
      over-claims corpus-wide (worst: the25 DOR-certainty over-generalized x5; jes26 C09 "clearance
      maintained" contradicting the paper's "amyloid reaccumulates"; huu25 ungrounded MAPT clause).
