  - id: O21
    timestamp: "2026-07-05"
    provenance: ai-suggested
    content: >
      codex:codex-rescue subagent dispatch is NON-blocking, unlike the Claude general-purpose subagent
      pattern used for N42. The wrapper subagent's single Bash call to `codex-companion.mjs task ...`
      returns almost immediately with "Codex Task started in the background as task-<id>" — the actual
      compile work continues as a separate detached Codex CLI process, confirmed via
      `codex-companion.mjs status --all --json` to be a real running process (with its own pid) after
      the wrapper subagent had already completed. Any future Codex-subagent batch must poll job status
      (e.g. a Monitor-tool loop against `status --all --json`) rather than treating the Agent-call
      return, or the wrapper's stdout, as evidence the compile finished. Caveat from this turn: an
      ad-hoc jq status filter returned an empty/malformed status field for every job on its first
      "done" signal — the filter logic itself needs fixing before its output can be trusted, a tooling
      bug distinct from the finding about Codex's dispatch behavior.
    context: "Discovered while dispatching batch 1/5 (10 papers) of the Codex-based 50-paper compile wave (N45)."
    potential_type: heuristic
    bound_to: [N44, N45]
