    provenance: ai-suggested
    content: >
      Design learning (self-caught over-claim): the grounding ratio only verifies that a «quote» is
      PRESENT beside a number, not that the quote is real or actually supports the number. So
      grounding=1.0 means 'claims are quote-decorated', not 'claims are verifiably grounded'. A true
      grounding metric needs a re-open-the-source verification step (the [sem]/[det]-verify pass not
      yet built). My earlier 'grounding is the metric that earned its keep' was itself scope-inflated —
      the exact failure the metrics are meant to catch.
    context: "Turn-12 reflection; the one metric I praised is weaker than claimed."
