  - id: O07
    timestamp: "2026-07-05"
    provenance: ai-suggested
    content: >
      Review finding: metrics must be GENRE-AWARE. Clinical trials/reviews/guidelines structurally
      lack code (D1-L3), documented failures (D3 floors ~0), and negative results (negative-result
      share ~0); scoring these 0 penalizes a paper for its genre rather than its quality. For genres
      that structurally lack a dimension, report "N/A for genre" not 0. On this clinical corpus the
      informative discriminators are grounding (D2) and trial-linkage (D6); the near-ceiling structural
      metrics and the floored D3/L3 are not. D5 (flagship cross-library graph) remains entirely
      unvalidated at n=10.
    context: >
      My critical review of the wave-1 test run (turn 11); complements O05 (spec-proxy mismatch).
    potential_type: constraint
