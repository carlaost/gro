  - id: O08
    timestamp: "2026-07-05"
    provenance: ai-suggested
    content: >
      Design learning: some 'metrics' are validity GATES, not quality RANKERS, and were mislabeled.
      Cross-layer binding resolvability (~0.99) and seal-L1 (~0.97) being near-ceiling is correct — a
      well-formed ARA is supposed to have resolving links; these are L1 pass/fail hygiene checks.
      Averaging/ranking on them is a category error. Fix: separate binary gate metrics (hygiene) from
      continuous ranking metrics (quality); don't report variance on gates. Refines O06.
    context: "Defense/learnings reflection on my own critique (turn 12)."
