  - id: O18
    timestamp: "2026-07-05"
    provenance: ai-suggested
    content: >
      Refinement (narrows O06/O11/O17): "metrics measure the compiler not the paper" splits into three
      distinct cases, and the critique only applies to two. (1) EXTRACTIVE layers (claims, numbers,
      evidence tables) — the compiler is a faithful re-view; metrics on these ARE metrics on the paper,
      so the flagship claims+evidence work is NOT contaminated (concession — my earlier framing was
      over-broad). (2) HOMOGENIZATION — a faithful compiler still fills the same template for every
      paper, so presence-metrics (falsifiability-field-exists, links-resolve) measure field-population,
      not the paper's rigor; useless as rankers even with a perfect compiler. (3) FABRICATION — where
      the ARA schema demands a layer the paper lacks (exploration trace/dead-ends for a review/meta-
      analysis), the compiler INVENTS content (che26 dead-ends = flipped conclusions); NOT a view of the
      paper. Meta-point that survives a perfect compiler: compiler-fidelity and metric-validity are
      different axes — a faithful re-view adds no ground truth, so validity still needs an external
      yardstick (= RC2). "Can't validate on this corpus" holds regardless of compiler quality.
    context: "User challenged 'if the compiler is a correct different view, why does it matter?' (turn 19)."
    potential_type: claim
    bound_to: [N27, N31]
    promoted: true
    promoted_to: "logic/claims.md:C16"
    crystallized_via: verbal-affirmation
    stale: false

