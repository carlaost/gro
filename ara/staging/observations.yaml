observations:
  - id: O01
    timestamp: "2026-07-05"
    provenance: ai-suggested
    content: >
      The metric-design space over an ARA library decomposes into 7 directions across two axes:
      scope (local per-artifact / graph across the library / grounded via external DBs) and
      virtue of good science (reproducibility, rigor, process-transparency, novelty, corroboration,
      translation). Directions: (1) reproducibility & spec-completeness, (2) claim & evidence
      integrity, (3) process transparency & negative knowledge, (4) novelty & typed-dependency
      structure, (5) cross-library claim graph, (6) real-world grounding/translation, (7) artifact
      quality (meta, used to weight 4-5).
    context: >
      User asked (turn 3) to read the ARA paper + compiler and propose metric directions for a
      ~140-paper ARA library that count 'good science'. AI drafted research/metrics-directions.md.
    potential_type: concept
    bound_to: [N27]
    promoted: false
    promoted_to: null
    crystallized_via: null
    stale: false

  - id: O02
    timestamp: "2026-07-05"
    provenance: ai-suggested
    content: >
      The flagship metric is a cross-library claim graph built from oshima's typed claims + typed
      evidence (support/contradict/contextual) + FOL dedup (N14): corroboration count (independent
      papers supporting an FOL-equivalent claim), contradiction/contested score, replication depth
      (claims L3-reproduced by >=N artifacts), and real knowledge-reuse (imports/extends/reproduces
      by later ARAs, time-ordered). Proposed as an evidential alternative to the social citation
      network, directly targeting O4 (citations as a broken proxy).
    context: >
      Highest-leverage of the 7 directions per the drafted proposal; routes the project's
      distinctive value.
    potential_type: claim
    bound_to: [N27, N14]
    promoted: false
    promoted_to: null
    crystallized_via: null
    stale: false

  - id: O03
    timestamp: "2026-07-05"
    provenance: ai-suggested
    content: >
      Design principle for the metric system: Goodhart-resistance comes from using many independent
      structure-derived signals (not one number) and from rewarding exactly what citations punish
      (documented dead-ends, refutations, contested claims, replications). Any metric needing
      semantic judgment (evidence-relevance, falsifiability, scope-calibration) must extract findings
      with an LLM but compute the number deterministically from the findings list — because the ARA
      paper documents LLM-as-judge grade inflation + finding-score decoupling (N13).
    context: >
      Cross-cutting principle in research/metrics-directions.md; ties the metric proposal back to the
      paper's own review-system failure modes.
    potential_type: heuristic
    bound_to: [N27, N13]
    promoted: false
    promoted_to: null
    crystallized_via: null
    stale: false
  - id: O04
    timestamp: "2026-07-05"
    provenance: ai-executed
    content: >
      Empirical finding from the wave-1 metrics run: this AD blood-biomarker corpus exhibits the
      Storytelling-Tax pattern the metrics are built to expose — near-zero negative-result share,
      ~0 documented dead-ends, and status almost uniformly 'supported' across 84 claims. Process
      transparency (D3) and executable reproduction (D1-L3) are structurally low/N-A for clinical
      trials, reviews, and guidelines (0 code repos, request-only datasets), while real-world
      grounding (D6) is strong (verified NCTs). I.e., the metric that discriminates within this
      corpus is grounding/rigor + translation, not reproduction or negative-knowledge.
    context: >
      Ran research/metrics/compute_metrics.py over 10 OA ARAs (turn 9); see coverage-gaps.md.
    potential_type: claim
