      diagnostic auto-flagged falsifiability_presence (non-discriminating) + grounding_verified
      (low-variance). Caught+fixed a resolver bug (metadata.md lives in data/lib/, not the ARA dir)
      that had briefly shown the25 as 0-verified before it could become a false 'fabrication' finding.
    evidence: []
    also_depends_on: [N31]
    status: resolved


