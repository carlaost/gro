      pass, (3) no oshima FOL layer for real D5 graph, (4) pal25 missing exploration_tree + woj25
      missing Sources (recompile) + 2 paywalled abstract-only, (5) spec-completeness proxy is
      ML-shaped, wrong for clinical papers. L3 executable repro intrinsically N/A (no code/open data).
    evidence: []
    also_depends_on: [N29]
    status: resolved

  - id: N31
    type: decision
    support_level: explicit
    source_refs: ["session 2026-07-05_001 turn 13", "research/metrics/v2/compute_metrics_v2.py", "metrics-directions.md (Critiques section)"]
    provenance: user-revised
    timestamp: "2026-07-05"
    title: "V2 metrics: scoring-model redesign answering the six wave-1 critiques"
    choice: >
      Keep V1's deterministic inputs but reshape the scoring: split gates (binary hygiene) from
      rankers (continuous quality); add genre classification + an applicability model (N/A-for-genre
      not 0); verify grounding by re-opening cited files (presence != truth); tag paper- vs
      artifact-quality; add a per-ranker discrimination diagnostic. Saved under research/metrics/v2/.
    alternatives:
      - "Patch V1 in place — rejected; user asked for alternate metrics kept separately (V-subdir) to compare across"
      - "Rebuild from scratch — rejected; reuse V1 parsers, change only the scoring model"
    also_depends_on: [N29, N30]
    status: resolved   # H01-H05 crystallized from this

  - id: N32
    type: experiment
    support_level: explicit
    source_refs: ["session 2026-07-05_001 turn 13", "research/metrics/v2/comparison_v1_v2.md", "research/metrics/v2/library_metrics_v2.md"]
    provenance: ai-executed
    timestamp: "2026-07-05"
    title: "Run V2 over the 10 OA ARAs and compare V1 vs V2"
    result: >
      V2 exposes that V1 grounding was largely illusory: cum26/jes26/kes25/pal25/tit26 ground only to
