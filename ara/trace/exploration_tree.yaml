# Exploration graph for the desciencemodel project (agent-native scientific knowledge representation).
# Reconstructed from four sources. Project-level framing nodes are support_level: inferred;
# nodes grounded directly in a source carry support_level: explicit with source_refs.
# evidence: fields reference claim IDs (C##) in logic/claims.md.
tree:
  - id: N01
    type: question
    support_level: inferred
    title: "How should scientific knowledge be represented for an agent-native era?"
    description: >
      Root project question: when AI agents (not only humans) read, reproduce, and extend research,
      what representation should replace the narrative paper, and how does an AI-first record stay
      actionable for humans?
    status: open
    children:
      - id: N02
        type: question
        support_level: explicit
        source_refs: ["ARA paper §1", "ara_figure1", "ara_figure2"]
        title: "What does compiling research into a linear narrative cost AI agents?"
        description: "Storytelling Tax (lost process/failures) and Engineering Tax (under-specification)."
        status: resolved
        children:
          - id: N03
            type: experiment
            support_level: explicit
            source_refs: ["ARA paper §7.1", "§7.4", "Table 8", "Table 9", "Table 10"]
            title: "Quantify the information gap in published artifacts and the cost of failure"
            result: >
              Only 45.4% of reproduction requirements fully specified; failed runs are 90.2% of
              dollar cost (113x median token ratio).
            evidence: [C04, C05]
            status: resolved

      - id: N04
        type: decision
        support_level: explicit
        source_refs: ["ARA paper §3", "§4", "ara_figure4", "ara_figure5", "Table 5"]
        title: "Adopt a four-layer file-system ontology (Knowledge over Narrative)"
        choice: >
          Represent the work as /logic + /src + /trace + /evidence with cross-layer forensic
          bindings and a PAPER.md manifest, rather than a single narrative document.
        alternatives:
          - "Single narrative document (PDF) — flattening four conflicting knowledge types is lossy"
          - "Metadata schema only (FAIR, nanopublications, RO-Crate, ORKG) — no execution semantics + decision history jointly"
          - "PDF + GitHub + experiment tracker — siloed, no cross-layer bindings"
        evidence: [C09]
        status: resolved
        children:
          - id: N05
            type: experiment
            support_level: explicit
            source_refs: ["ARA paper §7.2", "Table 3"]
            title: "Paired QA: does ARA improve agent understanding?"
            result: "QA accuracy 93.7% vs 72.4%; largest gain on failure questions (+65.7%)."
            evidence: [C01, C02]
            status: resolved
          - id: N06
            type: experiment
            support_level: explicit
            source_refs: ["ARA paper §7.3", "Table 11", "Fig 11"]
            title: "Reproduction: does ARA improve and widen with difficulty?"
            result: "Difficulty-weighted success 64.4% vs 57.4%; gap grows easy->hard."
            evidence: [C03]
            status: resolved
          - id: N07
            type: experiment
            support_level: explicit
            source_refs: ["ARA paper §7.4", "Fig 12", "Fig 14", "Fig 15"]
            title: "Extension: do preserved failure traces help open-ended work?"
            result: "Faster first useful move with weaker base model; ordering can invert with a stronger one."
            evidence: [C06, C07]
            status: resolved
            children:
              - id: N08
                type: dead_end
                support_level: explicit
                source_refs: ["ARA paper §7.4", "ara_figure14", "ara_figure15"]
                title: "Preserved trace can constrain a sufficiently capable agent"
                hypothesis: "More trace context always helps the extending agent."
                failure_mode: >
                  On Sonnet 4.5 the paper-only agent beat ARA (triton 0.64 vs 0.27; restricted_mlm
                  1.03 vs 0.73) by inventing moves the trace never named.
                lesson: "Tag trace nodes with model-class provenance so successors can discount stale claims."
                status: resolved

      - id: N09
        type: decision
        support_level: explicit
        source_refs: ["ARA paper §5", "§6"]
        title: "Implement mechanisms as natural-language agent skills, not custom SDKs"
        choice: "Live Manager, Compiler, Rigor Auditor are skills so they improve with the base model."
        alternatives: ["Bespoke SDK/infrastructure per mechanism"]
        evidence: [C08]
        status: resolved

      - id: N10
        type: decision
        support_level: explicit
        source_refs: ["ARA paper §4", "§6.3"]
        title: "Hold evidence separately and withhold it from verification agents"
        choice: "Layered access control on /evidence to prevent fabrication-by-copying expected values."
        alternatives: ["Inline results with claims (enables copying/fabrication)"]
        evidence: [C08]
        status: resolved
        children:
          - id: N11
            type: experiment
            support_level: explicit
            source_refs: ["ARA paper §7.5", "Table 4", "Table 14"]
            title: "Rigor-Auditor mutation benchmark (L2 review)"
            result: "82.6% overall detection; near-100% on high-severity injections."
            evidence: [C08]
            status: resolved
            children:
              - id: N12
                type: dead_end
                support_level: explicit
                source_refs: ["ARA paper §7.5", "ara_table14"]
                title: "L2 misses orphan experiments"
                hypothesis: "An LLM auditor can catch structurally-orphaned experiments."
                failure_mode: "Only ~22% of orphan experiments detected (5/23 papers)."
                lesson: "Move orphan detection into deterministic L1 structural checks."
                status: resolved
              - id: N13
                type: dead_end
                support_level: explicit
                source_refs: ["ARA paper §7.5"]
                title: "LLM-as-judge grade inflation and finding-score decoupling"
                hypothesis: "An LLM judge can both find flaws and assign a calibrated score."
                failure_mode: >
                  17/23 ARAs rounded up to clear Accept; 22/23 critical flags did not lower the
                  dimension score.
                lesson: "LLMs generate findings; compute the verdict deterministically."
                status: resolved

      - id: N14
        type: decision
        support_level: inferred
        source_refs: ["src/execution/app/services/pipeline/storage_pipeline.py", "src/artifacts.md"]
        title: "Build the oshima API as a concrete agent-native KR system"
        choice: >
          A FastAPI service that ingests paper PDFs and produces structured claims, typed evidence,
          first-order-logic, and cross-paper themes (a working instantiation of the ARA cognitive layer).
        alternatives: ["Manual annotation", "Keep knowledge as prose/PDF"]
        evidence: [C10, C11, C12]
        status: open
        children:
          - id: N15
            type: experiment
            support_level: inferred
            source_refs: ["src/execution/app/services/extract/extract_paper.py", "src/execution/app/models/extract.py"]
            title: "Verify ingestion + schema-constrained claim/evidence extraction"
            result: "Captured code defines typed evidence and chunked claim+evidence extraction; runtime verification pending."
            evidence: [C10]
            status: open
          - id: N16
            type: pivot
            support_level: explicit
            source_refs: ["src/execution/app/api/v1/api.py", "src/execution/app/services/jobs/job_service.py"]
            title: "File-based JobManager -> DB-only JobService"
            from: "File-based JobManager + original jobs router"
            to: "DB-based atomic job claiming (jobs-new) with claim TTL and retries"
            trigger: "Original upload endpoint broken (storage filename mismatch); two job generations coexisted."
            status: resolved

      - id: N17
        type: question
        support_level: explicit
        source_refs: ["Otte et al. Abstract", "§1", "mo_figure1"]
        title: "Can one shared embedding space represent cross-omics biology?"
        description: "Unify genes/proteins/enzymes/small molecules as directions in a shared space."
        status: resolved
        children:
          - id: N18
            type: decision
            support_level: explicit
            source_refs: ["Otte et al. §Methods", "mo_figure2", "mo_figure3"]
            title: "Word2Vec-style two-tower network over MetaCyc pathway sequences (128-D)"
            choice: "Shallow target/context linear+tanh net, MSE on dot product, positive+negative pairs."
            alternatives: ["Deeper architectures", "Single-modality fingerprints (ECFP/MACCS/SMILES Transformer)"]
            evidence: [C13]
            status: resolved
            children:
              - id: N19
                type: decision
                support_level: explicit
                source_refs: ["Otte et al. §Methods"]
                title: "Under-sample hub intermediates (water, O2, CO2)"
                choice: "Down-weight ubiquitous cofactors to improve space coverage and avoid hub bias."
                alternatives: ["Sample all nodes uniformly"]
                evidence: [C13]
                status: resolved
              - id: N20
                type: experiment
                support_level: explicit
                source_refs: ["Otte et al. §Results", "mo_figure4"]
                title: "t-SNE clustering + omics-type coloring"
                result: "Distinct clusters; modalities intermixed; clusters share functional characteristics."
                evidence: [C13]
                status: resolved
              - id: N21
                type: experiment
                support_level: explicit
                source_refs: ["Otte et al. §Results", "mo_figure4"]
                title: "Dot-product distribution + nearest-neighbor case study"
                result: "Bimodal dot products; UDP-alpha-D-galactose neighbor encodes PGM1 (MetaCyc-consistent)."
                evidence: [C14, C15]
                status: resolved
          - id: N22
            type: dead_end
            support_level: explicit
            source_refs: ["Otte et al. §Discussion"]
            title: "Missing structural/locational dimension; binary edges"
            hypothesis: "Pathway-sequence context alone captures enough biology."
            failure_mode: >
              Structural/3-D and locational information is only implicit; MetaCyc edges are binary so
              interaction strength/confidence is lost.
            lesson: "Add structural/functional/compositional channels; need weighted-edge data."
            status: resolved
          - id: N23
            type: dead_end
            support_level: explicit
            source_refs: ["Otte et al. §Discussion", "Alien Proteins essay"]
            title: "Cross-tissue/cross-domain data scarcity and harmonization mismatch"
            hypothesis: "The embedding generalizes across tissues/organisms."
            failure_mode: >
              Annotated pathways thin out away from model organisms; differential-expression data has
              a different interpretation and often cannot be harmonized across platforms.
            lesson: "Clean, abundant, standardized data is the binding constraint, not architecture/compute."
            status: open

      - id: N24
        type: decision
        support_level: inferred
        source_refs: ["Alien Proteins essay", "Papers Block Scientific Progress essay"]
        title: "Project thesis: an AI-first record needs a human-readable decoding layer"
        choice: >
          Pair machine-native representations (ARA layers, FOL stores, embedding spaces) with a
          decoding layer that returns hypotheses/designs/candidates a scientist can act on
          (synthetic-node decoding / 'alien proteins').
        alternatives: ["Machine-only records (unreadable by humans)", "Human-only narrative (lossy for agents)"]
        also_depends_on: [N04, N18, N14]
        evidence: [C15]
        status: open

  - id: N25
    type: decision
    support_level: explicit
    source_refs: ["session 2026-07-05_001"]
    provenance: user-revised
    timestamp: "2026-07-05"
    title: "Backprocess existing literature into per-paper ARAs via the compiler skill"
    choice: >
      Use the ARA Compiler skill (not the oshima API service, N14) as the tool to backprocess a
      collection of literature PDFs. Output layout: one self-contained ARA per paper under
      research/ara-library/<paper-slug>/ (not a single merged library ARA like research/ara/).
      Execution: dispatch one compiler subagent per PDF, running in parallel.
    alternatives:
      - "One merged library ARA with cross-paper claims/themes (like research/ara/) — rejected for a general literature backprocess; per-paper keeps each independently browsable/validatable"
      - "Run the oshima API (N14) over the PDFs — not runnable from this repo (no pyproject/.env/README captured; needs Supabase + OpenAI + Adobe PDF Services + CoreNLP)"
      - "Compile sequentially in the main session — slower for a batch; parallel subagents chosen"
    also_depends_on: [N04, N14]
    status: open   # approach decided + confirmed; batch not yet run (blocked on PDF source location)

  - id: N26
    type: decision
    support_level: explicit
    source_refs: ["session 2026-07-05_001 turn 2", "input: ~/Downloads/search-papers.csv"]
    provenance: user-revised
    timestamp: "2026-07-05"
    title: "Enrich each library paper with code/data/clinical-trial discovery before compiling"
    choice: >
      Source library = search-papers.csv (a 100+ paper search export). For each paper, dispatch a
      discovery subagent (parallel, in waves) to find and verify a code repo, a dataset, and any
      linked clinical trial (any subset may exist). Fetch depth: download the open-access PDF and
      record repo/data/trial as verified links + metadata. Assemble a compiler-friendly per-paper
      lib under research/data/lib/<paper-slug>/ (PDF + links manifest), then run the compiler over
      it (one ARA per paper). Because the lib is large (100+), run a capped first wave (~10), report
      quality, then continue.
    alternatives:
      - "Compile PDFs directly with no enrichment — loses the code/data/trial linkage the user wants surfaced"
      - "Download all repos + datasets locally — rejected as too heavy/gated for a first pass"
      - "Process all 100+ in one shot — rejected; capped wave first to check output quality before a runaway run"
    also_depends_on: [N25]
    status: open   # blocked: ~/Downloads not readable by the agent shell (macOS TCC); awaiting user to relocate the CSV

  - id: N27
    type: question
    support_level: explicit
    source_refs: ["session 2026-07-05_001 turn 3", "research/metrics-directions.md", "problem.md O4", "problem.md G4"]
    provenance: user
    timestamp: "2026-07-05"
    title: "What metrics of good science are computable over a library of ~140 compiled ARAs?"
    description: >
      Given a library of ~140 works compiled to ARAs (each with a PDF, ideally a code repo, and some
      with linked clinical-trial records + datasets), what can be counted, and which counts proxy for
      good science — as an alternative to citation-based proxies (O4: citations are a Goodharted
      relevance signal). Framed as: count many independent, structure-derived signals rather than one
      number, so no single metric can be gamed.
    also_depends_on: [N04, N14, N24]
    status: open   # proposal drafted (research/metrics-directions.md); no direction chosen/affirmed yet

  - id: N28
    type: decision
    support_level: explicit
    source_refs: ["session 2026-07-05_001 turn 4"]
    provenance: ai-suggested
    timestamp: "2026-07-05"
    title: "Restrict PDF acquisition to licit open-access sources"
    choice: >
      Acquire full-text PDFs only from legitimate open-access channels (Unpaywall, PMC / Europe PMC
      full text, preprint servers, author/institutional self-archived copies, publisher OA). For
      paywalled papers with no licit OA copy, record the landing/best-PDF URL and mark the PDF as
      not-downloaded rather than routing the download through a non-authorized full-text source.
    alternatives:
      - "Route paywalled DOIs through a non-authorized full-text source (user request, turn 4) — declined: it distributes paywalled articles without authorization; not building paywall circumvention into the pipeline"
      - "Compile from abstract + metadata + discovered links when full text is unavailable — accepted as the degraded-but-licit fallback"
    also_depends_on: [N26]
    status: open   # AI declined the user's non-authorized-source request on copyright grounds; awaiting user response on the licit-only fallback

  - id: N29
    type: decision
    support_level: explicit
    source_refs: ["session 2026-07-05_001 turn 8", "research/metrics/compute_metrics.py"]
    provenance: user-revised
    timestamp: "2026-07-05"
    title: "Implement the metrics as a deterministic /metrics ARA layer + library rollup"
    choice: >
      A stdlib+PyYAML workflow (research/metrics/compute_metrics.py) that loads every compiled ARA +
      its sources.yaml, computes the [det] metrics exactly, and writes an extra /metrics layer:
      per-ARA research/ara-library/<slug>/metrics/{metrics.json,metrics.md} + a library rollup at
      research/metrics/library_metrics.{json,md}. [sem] (LLM-judge) and [ext] (sandbox/ChEMBL/trial)
      metrics are emitted as pending_* with gathered inputs, never fabricated.
    alternatives:
      - "Compute metrics inline per-turn without a persisted layer — rejected; user wanted a re-runnable workflow + a /metrics layer next to the artifacts"
      - "Fabricate [sem]/[ext] values to fill every metric — rejected; violates the deterministic-verdict / no-hallucination discipline"
    also_depends_on: [N27, N26]
    status: resolved   # built, runs clean over the 10 wave-1 ARAs

  - id: N30
    type: experiment
    support_level: explicit
    source_refs: ["session 2026-07-05_001 turn 9", "research/metrics/coverage-gaps.md", "research/metrics/library_metrics.md"]
    provenance: ai-executed
    timestamp: "2026-07-05"
